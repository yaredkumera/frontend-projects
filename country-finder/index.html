<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COUNTRY FETCHER</title>
    <link rel="stylesheet" href="COUNTRY.css" />
  </head>
  <body>
    <div class="cont1">
      <div class="header">
        <h2 class="h21">🌍 Country Info Finder </h2>
      </div>

      <div class="headcont">
        <input
          list="countries"
          id="country"
          class="input"
          name="country"
          placeholder="Enter coutry name"
        />

        <datalist id="countries">
          <option value="Ethiopia"></option>
          <option value="Kenya"></option>
          <option value="Nigeria"></option>
          <option value="Egypt"></option>
          <option value="india"></option>
          <option value="Brazil"></option>
          <option value="peru"></option>
          <option value="pakistan"></option>
        </datalist>

        <button>Search</button>
      </div>
      <div class="contbody">
        <div class="contBody1">
          <div class="childbody11"></div>
          <div class="childbody12">
            <span class="span1"></span>
            <span class="spanimg">
              <img
                style="width: 150px; height: 70px; border-radius: 5px"
                class="img"
                src=""
              />
            </span>
          </div>
        </div>

        <div class="contBody2">
          <div class="childbody21"></div>
          <div class="childbody22"></div>
        </div>

        <div class="contBody3">
          <div class="childbody31"></div>
          <div class="childbody32"></div>
        </div>
      </div>
      <div class="error"></div>
    </div>
    <script src="country.js"></script>
  </body>
</html>
