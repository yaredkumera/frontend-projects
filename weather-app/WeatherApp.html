<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Weather App</title>
    <link rel="stylesheet" href="wheatherApp.css">
  </head>
  <body>
    <div class="cont">
      <h1>Weather App</h1>
      <div class="header">
        <input type="text" id="city" placeholder="Enter city" />
        <button id="getWeather">Get Weather</button>
      </div>
      <div id="result">
        <p class="temp"></p>
        <p class="wind"></p>
        <p class="humdty"></p>
        <p class="max"></p>
      </div>
    </div>
    <h2
      style="
        display: none;
        min-height: 25px;
        background-color: red;
        color: white;
        border-radius: 20px;
        padding: 10px;
      "
    ></h2>
    <script src="wheatherApp.js">
     
    </script>
  </body>
</html>
